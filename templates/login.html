<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Family — Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #09090f;
  color: #e8e8f0;
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.card {
  background: #0d0d1a;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px;
  padding: 48px 40px;
  width: 100%;
  max-width: 380px;
  text-align: center;
}
.logo { font-size: 32px; font-weight: 800; margin-bottom: 4px;
  background: linear-gradient(90deg, #7c5ff0, #60a5fa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sub { color: #6b6b90; font-size: 13px; margin-bottom: 36px; }
input {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #e8e8f0;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  padding: 14px 16px;
  margin-bottom: 14px;
  outline: none;
  transition: border .2s;
}
input:focus { border-color: #5b3de8; }
button {
  width: 100%;
  background: linear-gradient(135deg, #5b3de8, #2563eb);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  padding: 14px;
  cursor: pointer;
  transition: opacity .2s;
}
button:hover { opacity: .85; }
.error { color: #ef4444; font-size: 12px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">The Family</div>
  <div class="sub">Panel de administración</div>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Contraseña del panel" autofocus>
    <button type="submit">Entrar</button>
  </form>
</div>
</body>
</html>
